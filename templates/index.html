<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CineMatch | Movie Recommendations</title>

  <style>
    :root {
      --primary: #ff6347;
      --overlay: rgba(0, 0, 0, 0.75);
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      /* Dynamic Background with fallback color */
      background: linear-gradient(var(--overlay), var(--overlay)), 
                  url("{{ url_for('static', filename='images/bg.jpg') }}");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Glassmorphism Effect for the Main Card */
    .glass-panel {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      padding: 30px;
      margin-top: 50px;
      width: 90%;
      max-width: 800px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      color: var(--primary);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    .controls select, .controls button {
      padding: 12px 20px;
      font-size: 16px;
      margin: 10px;
      border: none;
      border-radius: 30px;
      outline: none;
      transition: 0.3s;
    }

    select {
      background-color: rgba(0,0,0,0.6);
      color: #fff;
      border: 1px solid var(--primary) !important;
      cursor: pointer;
    }

    button {
      background-color: var(--primary);
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255, 99, 71, 0.4);
    }

    button:hover {
      transform: scale(1.05);
      background-color: #e5533c;
    }

    #timeMessage {
      font-style: italic;
      color: #ccc;
      margin-bottom: 20px;
    }

    /* Modern Movie List Design */
    #movies_list {
      margin-top: 30px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      width: 100%;
    }

    .movie-item {
      background: rgba(0, 0, 0, 0.6);
      padding: 20px;
      border-left: 5px solid var(--primary);
      border-radius: 10px;
      text-align: left;
      transition: 0.3s;
    }

    .movie-item:hover {
      background: rgba(255, 255, 255, 0.05);
      transform: translateY(-5px);
    }

    .movie-item h3 {
      margin: 0 0 10px 0;
      color: var(--primary);
    }

    .movie-item p {
      font-size: 14px;
      line-height: 1.5;
      color: #ddd;
    }

    /* Custom Scrollbar for better look */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
  </style>
</head>

<body>

  <div class="glass-panel">
    <h1>🎬 CineMatch</h1>
    <p>Find your next favorite movie based on your mood.</p>

    <div class="controls">
      <label>What's the time?</label>
      <select id="time">
        <option value="morning">☀️ Morning</option>
        <option value="afternoon">🌤️ Afternoon</option>
        <option value="evening">🌆 Evening</option>
        <option value="night">🌙 Night</option>
      </select>

      <button onclick="showGenres()">Explore Moods</button>
    </div>

    <p id="timeMessage"></p>
    <div id="genresList" class="controls"></div>
    
    <div id="movies_list"></div>
  </div>

<script>
// ... (Your existing JavaScript remains exactly the same) ...
const genresByTime = {
  morning: ["motivational", "comedy"],
  afternoon: ["action", "adventure"],
  evening: ["romantic", "fantasy"],
  night: ["horror", "thriller"]
};

const timeMessages = {
  morning: "Start your day with light movies!",
  afternoon: "Enjoy action-packed movies!",
  evening: "Relax with romantic movies!",
  night: "Watch thrilling movies!"
};

function showGenres() {
  const time = document.getElementById("time").value;
  const genres = genresByTime[time];
  const container = document.getElementById("genresList");

  container.innerHTML = "";
  document.getElementById("timeMessage").innerText = timeMessages[time];
  document.getElementById("movies_list").innerHTML = "";

  const dropdown = document.createElement("select");
  dropdown.id = "genreDropdown";

  genres.forEach(g => {
    const option = document.createElement("option");
    option.value = g;
    option.textContent = g.charAt(0).toUpperCase() + g.slice(1);
    dropdown.appendChild(option);
  });

  container.appendChild(dropdown);

  const btn = document.createElement("button");
  btn.textContent = "Get Recommendations";
  btn.onclick = showMovies;

  container.appendChild(btn);
}

async function showMovies() {
  const genre = document.getElementById("genreDropdown").value;
  const container = document.getElementById("movies_list");

  container.innerHTML = "<p>Scanning the multiverse for movies...</p>";

  try {
    const res = await fetch("/recommend", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ genre: genre })
    });

    const data = await res.json();
    container.innerHTML = "";

    if (data.movies.length === 0) {
      container.innerHTML = "<p>No movies found for this mood.</p>";
      return;
    }

    data.movies.forEach(movie => {
      const div = document.createElement("div");
      div.className = "movie-item";
      div.innerHTML = `
        <h3>${movie.title}</h3>
        <p><b>Genre:</b> ${movie.genres}</p>
        <p>${movie.overview}</p>
      `;
      container.appendChild(div);
    });

  } catch (err) {
    container.innerHTML = "Error loading movies.";
  }
}
</script>

</body>
</html>
